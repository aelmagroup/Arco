<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projets – Architecture Commune</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="category">

  <div class="mobile-bar">
    <a href="index.html" class="mobile-logo"><img src="media/logos/logo-arco.png" alt="Architecture Commune"></a>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
  <div class="sidebar-backdrop"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="cat-page" id="cat-page"></section>
      <footer class="content-footer"><span>© 2026 Architecture Commune — Arco</span></footer>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      let cat = params.get('cat');
      if (!cat || !CATEGORIES[cat]) cat = CATEGORY_ORDER[0];

      const c = CATEGORIES[cat];
      const list = getProjectsByCategory(cat);
      document.title = c.label + ' – Architecture Commune';

      const cards = list.map(p => {
        const cover = p.images && p.images.length
          ? `<img src="${encodeURI(p.images[0])}" alt="${p.title}" loading="lazy">`
          : `<div class="card-placeholder"></div>`;
        return `
          <a href="projet.html?id=${p.id}" class="cat-card">
            <div class="cat-card-img">${cover}</div>
            <div class="cat-card-meta">
              <span class="cat-card-num">${p.num}</span>
              <span class="cat-card-title">${p.title}</span>
              ${p.location ? `<span class="cat-card-loc">${p.location}</span>` : ''}
              ${p.year ? `<span class="cat-card-year">${p.year}</span>` : ''}
            </div>
          </a>`;
      }).join('');

      document.getElementById('cat-page').innerHTML = `
        <header class="cat-head">
          <h1 class="cat-title cat-title--${c.cssClass}">${c.label}</h1>
          <p class="cat-desc-mobile">${c.description}</p>
        </header>
        <div class="cat-list">${cards}</div>`;
    })();
  </script>
</body>
</html>
