<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projet – Architecture Commune</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="project">

  <div class="mobile-bar">
    <a href="index.html" class="mobile-logo"><img src="media/logos/logo-arco.png" alt="Architecture Commune"></a>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
  </div>
  <div class="sidebar-backdrop"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">
      <section class="detail" id="detail">
        <div class="detail-loading">Chargement…</div>
      </section>
      <footer class="content-footer"><span>© 2026 Architecture Commune — Arco</span></footer>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (function () {
      const id = new URLSearchParams(location.search).get('id');
      const p = id ? getProject(id) : null;
      const root = document.getElementById('detail');

      if (!p) {
        root.innerHTML = `<a href="index.html" class="back-link">Accueil</a><p class="detail-loading">Projet introuvable.</p>`;
        return;
      }

      const c = CATEGORIES[p.category];
      document.title = p.title + ' – Architecture Commune';
      const imgs = (p.images || []).slice(0, 5);

      const mainInner = imgs.length
        ? `<img src="${encodeURI(imgs[0])}" alt="${p.title}" id="gmain">
           ${imgs.length > 1 ? `<button class="g-prev" aria-label="Précédent">&#8592;</button><button class="g-next" aria-label="Suivant">&#8594;</button>` : ''}`
        : `<div class="card-placeholder" style="position:absolute;inset:0;"></div>`;

      const thumbs = imgs.length > 1 ? imgs.map((src, i) =>
        `<button class="g-thumb ${i === 0 ? 'active' : ''}" data-i="${i}"><img src="${encodeURI(src)}" alt="Vue ${i + 1}"></button>`
      ).join('') : '';

      const rows = [
        ['Mission', p.mission],
        ['Maîtrise d\'ouvrage', p.mo],
        ['Localisation', p.location],
        ['Année', p.year],
        ['Budget', p.budget],
        ['Partenaires', p.partners]
      ].filter(r => r[1]).map(r =>
        `<div class="info-row"><span class="info-label">${r[0]}</span><span class="info-value">${r[1]}</span></div>`
      ).join('');

      const links = (p.links && p.links.length)
        ? `<div class="info-links"><span class="info-label">Plus d'informations</span>
             <div class="info-links-list">${p.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}</div>
           </div>`
        : '';

      root.innerHTML = `
        <a href="projets.html?cat=${p.category}" class="back-link">${c.label}</a>
        <header class="detail-head">
          <span class="badge badge--${c.cssClass}">${c.label}</span>
          <h1 class="detail-title">${p.title}</h1>
          ${p.location ? `<p class="detail-loc">${p.location}</p>` : ''}
        </header>

        <div class="detail-grid">
          <div class="gallery">
            <div class="gallery-main">${mainInner}</div>
            ${thumbs ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
          </div>
          <aside class="detail-info">
            ${p.description ? `<p class="info-desc">${p.description}</p>` : ''}
            ${rows ? `<div class="info-table">${rows}</div>` : ''}
            ${links}
          </aside>
        </div>`;

      /* Galerie */
      if (imgs.length > 1) {
        let cur = 0;
        const main = document.getElementById('gmain');
        const tbs = [...root.querySelectorAll('.g-thumb')];
        function go(i) {
          cur = (i + imgs.length) % imgs.length;
          main.src = encodeURI(imgs[cur]);
          tbs.forEach(t => t.classList.toggle('active', +t.dataset.i === cur));
        }
        tbs.forEach(t => t.addEventListener('click', () => go(+t.dataset.i)));
        root.querySelector('.g-prev').addEventListener('click', () => go(cur - 1));
        root.querySelector('.g-next').addEventListener('click', () => go(cur + 1));
        document.addEventListener('keydown', e => {
          if (e.key === 'ArrowLeft') go(cur - 1);
          if (e.key === 'ArrowRight') go(cur + 1);
        });
      }
    })();
  </script>
</body>
</html>
